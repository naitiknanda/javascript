<!DOCTYPE html>
<html>
    <head>
        <script>
            function validateForm() {
                var x = document.forms["naitik"]["fname"].value;
                if (x == "") {
                    alert("Name must be filled out");
                    return false;
                }
            }
        </script>
        <body>
            <form name="naitik" onsubmit="return validateForm()">
                Name:- <input type="text" name="fname">
                <input type="submit" value="Submit">
            </form>
            <p id="message"></p>
        </body>
    </head>
</html>
