<!DOCTYPE html>
<html>
    <body>
        <h2>JAVASCRIPT ERROR HANDELING</h2>
        <p>This example demonstrates how to use <b>catch</b> to display an error</p>
        <p id="error_msg">
            <script>
               
               try {
               function addalert(message)
                   {

document.write(message)

}
                   
                
                    addalert("Welcome guest");
                }
                catch(err) {
                    document.getElementById("error_msg").innerHTML = err.message;
                }

            </script>
        </p>
    </body>
</html>
